
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários Cadastrados</title>
</head>
<body>
    <h1> Listas de Usúarios</h1>

    <table border="1">
        <thead>
            <tr>
                <tr>ID</tr>
                  <tr>Nome</tr>
                    <tr>Email</tr>
                      <tr>Foto</tr>
            </tr>
        </thead>
        <tbody id="tabelaUsuarios"></tbody>
    </table>

    <script>
        async function carregarUsuarios() {
            const reposta = await fetch("/usuarios");
            const usuarios = await reposta.json();

            const tabela = document.getElementById("tabelaUsuarios");
            tabela.innerHTML ="";

            usuarios.forEach(usuario => {
                tabela.innerHTML+= `
                
                <tr>${usuario.id}</td>
                <td>${usuario.nome}
                <td>${usuario.email}
                <td>
                    ${usuario.foto ? `<img src='/uploads/ ${usuario.foto}
                    "width"60>` : "sem foto"}

                    </td>
                    </tr>
                `;
                  
            });
        }
        carregarUsuarios();   
    </script>
    <br>
    <a href="cadastro.html"> Ir para Cadrastro</a>
</body>
</html>
